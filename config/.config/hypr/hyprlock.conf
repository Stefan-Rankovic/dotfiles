source = $HOME/.cache/wal/colors-hyprland.conf

general {
	hide_cursor = true
}

background {
	monitor =
	path = ~/.config/hypr/wallpapers/hatsune-miku-5644x2880-22725.jpg
	blur_size = 4
    blur_passes = 3
	noise = 0.0117
	contrast = 1.3000
	brightness = 0.8000
	vibrancy = 0.2100
	vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3

    outer_color = $color0
    inner_color = $color0
    font_color = $color6

	fade_on_empty = true
    placeholder_text = <i>Enter password...</i>
	rounding = 22

    position = 0, 100
    halign = center
    valign = bottom
}

label {
    monitor =
    text = $TIME
    font_size = 64
    position = 0, 0
    halign = center
    valign = center
}
